spring.application.name=expense-tracker
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:MYSQL_DB}

spring.datasource.username=${MYSQL_USER:MYSQL_USER}

spring.datasource.password=${MYSQL_PASSWORD:MYSQL_PASSWORD}
logging.level.org.springframework.security=DEBUG