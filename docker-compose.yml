version: "3.8"

services:

  mysql:
    image: mysql:latest
    container_name: mysql_db_docker

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: Aastha@123
      MYSQL_DATABASE: expense_tracker
    # volumes:
    #   - mysql_data:/var/lib/mysql

    # restart: always

  app:
    image: aasthapokhriyal/expense-tracker-app:latest
    container_name: expense_tracker_springboot_project

    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expense_tracker
      MYSQL_USER: root
      MYSQL_PASSWORD: Aastha@123

    depends_on:
      - mysql

    restart: always
    # volumes:
    #   mysql_data:

